name: Lint

on:
  push:
    branches: [main]
    paths:
      - "**/*.ps1"
      - "RoboSy.ps1"
      - "tests/**/*.ps1"
      - "PSScriptAnalyzerSettings.psd1"
      - ".github/workflows/lint.yml"
  pull_request:
    paths:
      - "**/*.ps1"
      - "RoboSy.ps1"
      - "tests/**/*.ps1"
      - "PSScriptAnalyzerSettings.psd1"
      - ".github/workflows/lint.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force

      - name: Parse check (syntax)
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem -Path . -Recurse -Filter *.ps1 | ForEach-Object {
            $tokens = $null; $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors) {
              $failed = $true
              Write-Host "Parse errors in $($_.FullName):" -ForegroundColor Red
              $errors | ForEach-Object { Write-Host ("  {0} (line {1})" -f $_.Message, $_.Extent.StartLineNumber) }
            }
          }
          if ($failed) { throw "PowerShell parse errors were found." }
          Write-Host "All .ps1 files parsed successfully."

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Settings .\PSScriptAnalyzerSettings.psd1
          if ($results) {
            $results | Format-Table RuleName, Severity, ScriptName, Line, Message -AutoSize | Out-String -Width 200 | Write-Host
            throw "PSScriptAnalyzer reported $($results.Count) issue(s)."
          }
          Write-Host "PSScriptAnalyzer found no issues."

      # The parallel runner discovers every tests/*.Tests.ps1 file, runs them
      # concurrently as isolated child processes with a bounded worker ceiling
      # (auto: max(2, cores-2), clamped), enforces per-file and whole-run wall
      # timeouts, terminates process trees on timeout, propagates a non-zero exit
      # on any failure, and fails closed on zero discovered files. Each test file
      # still runs internally sequentially; only the files run in parallel.
      - name: Regression tests (Windows PowerShell 5.1)
        shell: powershell
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\tests\Invoke-RoboSyTests.ps1 -TestHost powershell.exe
          if ($LASTEXITCODE -ne 0) { throw "Regression tests failed under Windows PowerShell 5.1 (exit code $LASTEXITCODE)." }

      - name: Regression tests (PowerShell 7+)
        shell: pwsh
        run: |
          & pwsh -NoProfile -File .\tests\Invoke-RoboSyTests.ps1 -TestHost pwsh
          if ($LASTEXITCODE -ne 0) { throw "Regression tests failed under PowerShell 7+ (exit code $LASTEXITCODE)." }
